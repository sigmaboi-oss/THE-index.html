<!DOCTYPE html>
<html>
<body style="margin:0;background:#050505;font-family:'Segoe UI',sans-serif;color:#fff;">

<!-- 🔥 TITLE -->
<div style="
padding:12px;
font-weight:900;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
color:#ffae00;
border-bottom:2px solid #ff3c00;
text-shadow:0 0 10px #ff3c00;
">
🔥 Latest Recruits
</div>

<!-- 🔥 CONTAINER -->
<div id="members" style="
padding:8px;
background:linear-gradient(to bottom,#0a0a0a,#000);
">
Loading...
</div>

<script>
const club = "group-a162138be57d83c3500191b84a4b325d";

async function load(){
try{
const res = await fetch(`https://api.chess.com/pub/club/${club}/members`);
const data = await res.json();

// newest = weekly first
let latest = data.weekly || [];

// limit to 5
latest = latest.slice(0,5);

let container = document.getElementById("members");
container.innerHTML = "";

for(let i=0;i<latest.length;i++){

let u = latest[i];
let isFirst = i === 0;

// create row
let div = document.createElement("div");
div.style.cssText = `
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-bottom:1px solid rgba(255,60,0,0.15);
color:#cfcfcf;
transition:0.2s;
`;

div.innerHTML = `Loading ${u.username}...`;
container.appendChild(div);

try{

let profile = await fetch(`https://api.chess.com/pub/player/${u.username}`).then(r=>r.json());
let stats = await fetch(`https://api.chess.com/pub/player/${u.username}/stats`).then(r=>r.json());

let rating = stats.chess_rapid ? stats.chess_rapid.last.rating : "—";
let online = profile.status === "online";
let avatar = profile.avatar || "https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif";

div.innerHTML = `
<div style="
display:flex;
align-items:center;
gap:10px;
width:100%;
"
onmouseover="this.style.color='#ffae00';this.style.textShadow='0 0 8px #ff6a00';"
onmouseout="this.style.color='#cfcfcf';this.style.textShadow='none';"
>

<img src="${avatar}"
style="
width:32px;
height:32px;
border-radius:50%;
box-shadow:0 0 10px rgba(255,60,0,0.5);
">

<div style="display:flex;flex-direction:column;">
<a href="https://www.chess.com/member/${u.username}" target="_blank"
style="text-decoration:none;color:inherit;font-weight:700;">
${u.username}
</a>

<div style="font-size:11px;color:#888;">
${online ? "🟢 Online" : "⚫ Offline"} • Rapid: ${rating}
</div>
</div>

${isFirst ? `<span style="
margin-left:auto;
font-size:10px;
background:#ff3c00;
padding:3px 8px;
border-radius:6px;
font-weight:900;
box-shadow:0 0 12px #ff3c00;
">NEW</span>` : ""}

</div>
`;

}catch(e){
div.innerHTML = `<div style="color:red;">Error loading ${u.username}</div>`;
}

}

}catch(e){
document.getElementById("members").innerHTML="<div style='color:red;padding:10px;'>FAILED TO LOAD</div>";
}
}

load();
</script>

</body>
</html>
